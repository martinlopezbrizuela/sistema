<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAVAJU — Sistema de Gestión</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: white;
    padding: 38px;
    border-radius: 18px;
    box-shadow: 0 20px 45px rgba(0,0,0,.12);
    text-align: center;
  }
  .logo-agro {
    font-size: 22px;
    letter-spacing: 8px;
    font-weight: 500;
    color: #1f2937;
    margin-bottom: -4px;
  }
  .logo-kavaju {
    font-size: 64px;
    font-weight: 900;
    color: #9b6238;
    letter-spacing: 2px;
    line-height: 1;
  }
  .subtitle {
    color: #006b33;
    font-weight: 600;
    margin: 18px 0 28px;
  }
  label {
    display: block;
    text-align: left;
    font-weight: 700;
    color: #006b33;
    margin: 16px 0 8px;
  }
  input {
    width: 100%;
    height: 50px;
    border: 1px solid #d1d5db;
    border-radius: 9px;
    padding: 0 14px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #006b33; }
  .pin-row {
    display: flex;
    gap: 8px;
  }
  .pin-row input { flex: 1; }
  .pin-row button {
    width: 52px;
    border: 1px solid #d1d5db;
    border-radius: 9px;
    background: white;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.15s;
  }
  .pin-row button:hover { background: #f3f4f6; }
  .btn {
    width: 100%;
    height: 54px;
    margin-top: 28px;
    border: none;
    border-radius: 9px;
    background: #006b33;
    color: white;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #005528; }
  .btn:active { transform: scale(0.98); }
  .modules {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #6b7280;
  }
  .modules span {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    padding: 4px 10px;
  }
  #msg {
    font-weight: 700;
    margin-top: 18px;
    min-height: 24px;
    font-size: 14px;
  }
  @media (max-width: 480px) {
    .card {
      margin: 18px;
      padding: 28px 22px;
    }
    .logo-agro {
      font-size: 17px;
      letter-spacing: 5px;
    }
    .logo-kavaju {
      font-size: 48px;
    }
    .modules {
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-agro">AGROPECUARIA</div>
  <div class="logo-kavaju">KAVAJU</div>
  <div class="subtitle">Sistema de Gestión</div>

  <label>Usuario</label>
  <input id="usuario" type="text" value="KAVAJU" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pin').focus()">

  <label>PIN</label>
  <div class="pin-row">
    <input id="pin" type="password" placeholder="••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="togglePin()" title="Mostrar/ocultar PIN">👁</button>
  </div>

  <button class="btn" onclick="login()">INGRESAR AL SISTEMA</button>

  <div class="modules">
    <span>Ventas</span>
    <span>Stock</span>
    <span>Facturación</span>
    <span>Cobranzas</span>
  </div>

  <p id="msg"></p>
</div>

<script>
function togglePin() {
  const pin = document.getElementById('pin');
  pin.type = pin.type === 'password' ? 'text' : 'password';
}

function login() {
  const usuario = document.getElementById('usuario').value.trim().toUpperCase();
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('msg');

  if (usuario === 'KAVAJU' && pin === '3335') {
    msg.style.color = '#006b33';
    msg.textContent = '✓ ACCESO CONCEDIDO';
    setTimeout(function() {
      window.location.href = 'sistema.html';
    }, 600);
  } else {
    msg.style.color = '#dc2626';
    msg.textContent = '✕ Usuario o PIN incorrecto';
    document.getElementById('pin').value = '';
    document.getElementById('pin').focus();
  }
}
</script>
</body>
</html>
