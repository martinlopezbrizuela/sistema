<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAVAJU ERP</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="app">

  <aside class="sidebar">

    <div class="logo-wrap">
      <img src="https://i.imgur.com/6XGQx6T.png" class="logo">
      <div>
        <div class="logo-title">AGROPECUARIA</div>
        <div class="logo-sub">KAVAJU ERP</div>
      </div>
    </div>

    <nav class="menu">

      <button class="menu-item active">
        📊 Dashboard
      </button>

      <button class="menu-item">
        📦 Pedidos
      </button>

      <button class="menu-item">
        🧾 Facturas
      </button>

      <button class="menu-item">
        👥 Clientes
      </button>

      <button class="menu-item">
        🏭 Stock
      </button>

      <button class="menu-item">
        💰 Cobrar
      </button>

    </nav>

  </aside>

  <main class="content">

    <header class="topbar">

      <div>
        <h1>Dashboard General</h1>
        <p>Sistema de Gestión Agropecuaria</p>
      </div>

      <button class="new-btn">
        + Nuevo Pedido
      </button>

    </header>

    <section class="cards">

      <div class="card warning">
        <span>Pedidos Activos</span>
        <strong>12</strong>
      </div>

      <div class="card success">
        <span>Entregados</span>
        <strong>38</strong>
      </div>

      <div class="card danger">
        <span>Atrasados</span>
        <strong>4</strong>
      </div>

      <div class="card blue">
        <span>Total Facturado</span>
        <strong>Gs. 48M</strong>
      </div>

    </section>

    <section class="panel">

      <h2>Actividad Reciente</h2>

      <div class="activity">
        <div class="activity-item">
          <strong>PED-0012</strong>
          <span>Entrega realizada en Ypacaraí</span>
        </div>

        <div class="activity-item">
          <strong>FAC-0034</strong>
          <span>Factura pagada correctamente</span>
        </div>

        <div class="activity-item">
          <strong>STOCK</strong>
          <span>Terramicina bajo stock</span>
        </div>
      </div>

    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
